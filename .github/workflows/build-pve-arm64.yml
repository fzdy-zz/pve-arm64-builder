name: Build PVE arm64

on:
  workflow_dispatch:           # 手动触发（强烈建议第一次手动跑）
  schedule:
    - cron: '0 4 * * 0'        # 每周日 UTC 凌晨4点自动构建
  push:
    paths:
      - 'patches/**'
      - 'build_pve_arm64.sh'
      - 'Dockerfile'
      - '.github/workflows/build-pve-arm64.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker builder image
        run: docker build -t pve-arm64-builder:trixie .

      - name: Run PVE arm64 build
        run: |
          mkdir -p out/arm64 logs
          docker run --rm \
            -v ${{ github.workspace }}:/workspaces/pve \
            -w /workspaces/pve \
            -e OUT_DIR=/workspaces/pve/out/arm64 \
            -e LOG_DIR=/workspaces/pve/logs \
            -e RESUME_BUILT=1 \
            -e MAX_PASSES=3 \
            -e JOBS=4 \
            -e INSTALL_ALL_PROXMOX_DEVEL_PACKAGES=true \
            pve-arm64-builder:trixie \
            bash -lc '/workspaces/pve/build_pve_arm64.sh'

      - name: Prepare binary directory for GitHub Pages
        run: |
          mkdir -p binary-arm64
          cp -r out/arm64/*.deb binary-arm64/ 2>/dev/null || true
          cp out/arm64/Packages* binary-arm64/ 2>/dev/null || true
          cp README.md binary-arm64/README.md 2>/dev/null || true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./binary-arm64
          publish_branch: gh-pages
          force_orphan: true

      - name: Commit build artifacts to main (optional)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out/arm64/ logs/ binary-arm64/ || true
          git commit -m "chore: update arm64 build artifacts $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || true
