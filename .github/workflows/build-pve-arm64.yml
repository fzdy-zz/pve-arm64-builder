name: Build PVE arm64

on:
  workflow_dispatch:
    inputs:
      only_sources:
        description: '只构建指定源码包（逗号分隔，留空=全部）'
        required: false
        default: ''
      max_passes:
        description: '最大构建重试次数'
        required: false
        default: '4'
      resume_built:
        description: '复用已构建包 (1=是, 0=否)'
        required: false
        default: '1'
      jobs:
        description: '并行任务数（推荐 2-4）'
        required: false
        default: '3'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker builder image
        run: docker build -t pve-arm64-builder:trixie .

      - name: Run PVE arm64 build
        run: |
          mkdir -p out/arm64 logs
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/workspaces/pve \
            -w /workspaces/pve \
            -e OUT_DIR=/workspaces/pve/out/arm64 \
            -e LOG_DIR=/workspaces/pve/logs \
            -e REGENERATE_PLAN=1 \
            -e RESUME_BUILT=${{ inputs.resume_built }} \
            -e MAX_PASSES=${{ inputs.max_passes }} \
            -e JOBS=${{ inputs.jobs }} \
            -e ONLY_SOURCES="${{ inputs.only_sources }}" \
            -e INSTALL_ALL_PROXMOX_DEVEL_PACKAGES=true \
            pve-arm64-builder:trixie \
            bash -lc '/workspaces/pve/build_pve_arm64.sh'

      - name: Prepare binary directory
        run: |
          mkdir -p binary-arm64
          cp -r out/arm64/*.deb binary-arm64/ 2>/dev/null || true
          cp out/arm64/Packages* binary-arm64/ 2>/dev/null || true
          cp README.md binary-arm64/README.md 2>/dev/null || true

      # === GPG 签名（无需 Secrets）===
      - name: Generate GPG key and sign repository
        run: |
          cat > /tmp/gpg-batch <<EOF
          %echo Generating a basic OpenPGP key
          Key-Type: RSA
          Key-Length: 4096
          Subkey-Type: RSA
          Subkey-Length: 4096
          Name-Real: PVE arm64 Builder (fzdy-zz)
          Name-Comment: Auto-generated
          Name-Email: pve-arm64-builder@users.noreply.github.com
          Expire-Date: 0
          %no-protection
          %commit
          %echo done
          EOF

          gpg --batch --gen-key /tmp/gpg-batch
          KEYID=$(gpg --list-keys --keyid-format=long | grep -oP '(?<=/)[0-9A-F]{16}' | head -n1)

          cd binary-arm64
          apt-ftparchive release . > Release

          gpg --default-key $KEYID --armor --detach-sign -o Release.gpg Release
          gpg --default-key $KEYID --clearsign -o InRelease Release
          gpg --armor --export $KEYID > pve-arm64-builder-pubkey.asc

          echo "GPG Key ID: $KEYID"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./binary-arm64
          publish_branch: gh-pages
          force_orphan: true

      # === 修复后的 master commit 步骤（带 pull --rebase）===
      - name: Commit artifacts to master (optional)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 安全 pull + rebase
          git pull --rebase origin master || echo "Pull failed, continuing anyway"
          
          git add out/arm64/ logs/ binary-arm64/ || true
          git commit -m "chore: update arm64 build + GPG signature $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push origin master || echo "Push to master failed (non-blocking)"
